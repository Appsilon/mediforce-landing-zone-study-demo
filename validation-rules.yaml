# CDISCPILOT01 Study-Specific Validation Rules
# Custom rules appended from rejected delivery d-1777989822

- id: CUSTOM-DM-001
  domain: DM
  variable: ARM
  check: col_vals_in_set
  params:
    allowed_values:
      - "Xanomeline Low Dose"
      - "Xanomeline High Dose"
      - "Placebo"
  severity: Critical
  message: "ARM must contain only valid treatment arm values (Xanomeline Low Dose, Xanomeline High Dose, or Placebo)"

- id: CUSTOM-DM-002
  domain: DM
  variable: RFENDTC
  check: col_vals_not_null
  params:
    required_when: "ARM is not null"
  severity: Critical
  message: "RFENDTC (reference end date) must be populated when ARM is assigned"

- id: CUSTOM-DM-003
  domain: DM
  variable: ARMCD
  check: rows_distinct
  params:
    require_match: "ACTARMCD"
  severity: Major
  message: "ARMCD (planned arm code) must match ACTARMCD (actual arm code) for each subject"

- id: CUSTOM-DM-004
  domain: DM
  variable: ARM
  check: rows_distinct
  params:
    require_match: "ACTARM"
  severity: Major
  message: "ARM (planned arm) must match ACTARM (actual arm) for each subject"

- id: CUSTOM-DM-005
  domain: DM
  variable: RFXSTDTC
  check: col_vals_between
  params:
    require_less_than_or_equal: "RFXENDTC"
  severity: Major
  message: "RFXSTDTC (reference start date) must be less than or equal to RFXENDTC (reference end date)"
