# CDISCPILOT01 Validation Rules
# Study-specific edit checks for SDTMIG v3.4 conformance
# Generated: 2026-05-12

# ===== DM (Demographics) =====
- id: CUSTOM-DM-001
  domain: DM
  variable: ARM
  check: col_vals_not_null
  params:
    exclude_values: ['Screen Failure', 'Not Assigned', 'Unplanned Treatment', 'Not Treated']
  severity: Major
  message: "ARM must be populated and not equal to placeholder values (Screen Failure, Not Assigned, Unplanned Treatment, Not Treated)"

- id: CUSTOM-DM-002
  domain: DM
  variable: RFENDTC
  check: col_vals_not_null
  params:
    scope: ARM != ''
  severity: Major
  message: "RFENDTC must be populated when ARM is assigned"

# ===== AE (Adverse Events) =====
- id: CUSTOM-AE-001
  domain: AE
  variable: AEBDSYCD
  check: col_vals_not_null
  params:
    scope: AEBODSYS != ''
  severity: Major
  message: "AEBDSYCD (body system code) must be populated when AEBODSYS (body system term) is not empty"

- id: CUSTOM-AE-002
  domain: AE
  variable: AEENDTC
  check: col_vals_not_null
  params:
    scope: "AEOUT NOT IN ('NOT RECOVERED', 'NOT RESOLVED')"
  severity: Major
  message: "AEENDTC must be empty when AEOUT is 'NOT RECOVERED' or 'NOT RESOLVED' (event ongoing)"

# ===== LB (Laboratory) =====
- id: CUSTOM-LB-001
  domain: LB
  variable: LBSTRESN
  check: col_vals_not_null
  params:
    scope: "LBSTRESC LIKE '^[0-9]' OR (LBSTRESC IS NOT NULL AND LENGTH(LBSTRESC) > 0)"
  severity: Critical
  message: "LBSTRESN must be populated and equal to LBSTRESC when LBSTRESC is numeric"

- id: CUSTOM-LB-002
  domain: LB
  variable: LBTEST
  check: rows_distinct
  params:
    keys: ['LBTESTCD']
    must_distinct: true
  severity: Major
  message: "Each LBTESTCD must have a one-to-one relationship with LBTEST (no multiple LBTEST values per LBTESTCD)"

# ===== VS (Vital Signs) =====
- id: CUSTOM-VS-001
  domain: VS
  variable: VSBLFL
  check: rows_distinct
  params:
    keys: ['USUBJID', 'VSBLFL']
    constraint: "VSBLFL = 'Y' THEN count(USUBJID) = 1"
  severity: Major
  message: "Only one baseline record (VSBLFL = 'Y') is allowed per subject (USUBJID)"
