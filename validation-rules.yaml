# CDISC Study-Specific Validation Rules
# Study: CDISCPILOT01 (Xanomeline TTS for Alzheimer's Disease)
# SDTM IG 3.4 + ADaM IG 1.3
# Generated: 2026-05-13

rules:
  - id: CUSTOM-DM-001
    domain: DM
    variable: ARM
    check: col_vals_not_in_set
    params:
      exclusion_set:
        - "Screen Failure"
        - "Not Assigned"
        - "Unplanned Treatment"
        - "Not Treated"
    severity: Major
    message: "ARM must not be 'Screen Failure', 'Not Assigned', 'Unplanned Treatment', or 'Not Treated'."

  - id: CUSTOM-DM-002
    domain: DM
    variable: RFENDTC
    check: col_vals_not_null
    params:
      condition: "when ARM is not null"
    severity: Major
    message: "RFENDTC must not be null when ARM is provided."

  - id: CUSTOM-DM-003
    domain: DM
    variable: ARMCD
    check: cross_domain_ref
    params:
      ref_variable: ACTARMCD
      ref_domain: DM
      comparison: "must_match"
    severity: Major
    message: "ARMCD must match ACTARMCD."

  - id: CUSTOM-DM-004
    domain: DM
    variable: ARM
    check: cross_domain_ref
    params:
      ref_variable: ACTARM
      ref_domain: DM
      comparison: "must_match"
    severity: Major
    message: "ARM must match ACTARM."

  - id: CUSTOM-DM-005
    domain: DM
    variable: RFXSTDTC
    check: col_vals_between
    params:
      must_be_less_than_or_equal: RFXENDTC
    severity: Major
    message: "RFXSTDTC must not be greater than RFXENDTC."
