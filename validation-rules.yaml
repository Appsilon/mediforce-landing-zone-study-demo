# Custom validation rules for CDISCPILOT01
#
# These rules run AFTER the CDISC CORE engine (layer 2). They encode
# study-specific business logic that CDISC standards don't cover.
#
# Data managers own this file. Changes go through PR review.
# The R validation script (validate_custom.R) reads this file and
# executes checks via the pointblank package.
#
# Rule format:
#   domain:    SDTM domain code (DM, AE, LB, etc.)
#   variable:  SDTM variable name
#   check:     pointblank check function name
#   params:    parameters passed to the check function
#   severity:  Critical | Major | Minor | Warning
#   message:   human-readable description of what the rule checks
#
# Cross-domain rules use domain: "cross" and specify the join in params.

rules:
  # --- DM (Demographics) ---
  - id: CUSTOM-DM-001
    domain: DM
    variable: ARM
    check: col_vals_in_set
    params:
      set: ["Xanomeline Low Dose", "Xanomeline High Dose", "Placebo"]
    severity: Critical
    message: "ARM must match one of the 3 protocol-defined treatment arms"

  - id: CUSTOM-DM-002
    domain: DM
    variable: AGE
    check: col_vals_between
    params:
      left: 50
      right: 95
    severity: Major
    message: "AGE must be between 50-95 (Alzheimer's study inclusion criteria)"

  # --- AE (Adverse Events) ---
  - id: CUSTOM-AE-001
    domain: AE
    variable: AEDECOD
    check: col_vals_not_null
    params: {}
    severity: Major
    message: "AEDECOD (MedDRA preferred term) must not be null"

  - id: CUSTOM-DM-003
    domain: DM
    variable: RFENDTC
    check: col_vals_not_null
    params: {}
    severity: Major
    message: "RFENDTC (date of last dose/last visit) must be populated when ARM is provided"

  # --- AE (Adverse Events) ---
  - id: CUSTOM-AE-002
    domain: AE
    variable: AEBDSYCD
    check: col_vals_not_null
    params: {}
    severity: Major
    message: "AEBDSYCD must be populated when AEBODSYS is not empty"

  - id: CUSTOM-AE-003
    domain: AE
    variable: AEENDTC
    check: col_vals_not_null
    params: {}
    severity: Major
    message: "AEENDTC must not be populated when AEOUT is 'NOT RECOVERED', 'NOT RESOLVED', or 'UNKNOWN'"

  # --- LB (Laboratory) ---
  - id: CUSTOM-LB-001
    domain: LB
    variable: LBSTRESN
    check: col_vals_not_null
    params: {}
    severity: Major
    message: "LBSTRESN must be populated and equal to LBSTRESC when LBSTRESC is numeric"

  - id: CUSTOM-LB-002
    domain: LB
    variable: LBORNRHI
    check: col_vals_not_null
    params: {}
    severity: Minor
    message: "LBORNRHI must be empty when LBORRES is not a continuous measurement"

  # --- EX (Exposure) ---
  - id: CUSTOM-EX-001
    domain: EX
    variable: EXTRT
    check: col_vals_in_set
    params:
      set: ["Xanomeline", "Placebo"]
    severity: Critical
    message: "EXTRT must match protocol treatment names"
